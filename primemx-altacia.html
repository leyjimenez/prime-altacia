function calcStats(ventas=[], cfg={}) {
  const ct=nv(cfg.cuota_tienda), vt=nv(cfg.ventas_tienda), mx=nv(cfg.mix_nuevo)/100;
  const posV   = ventas.filter(v=>STYPES.find(s=>s.key===v.tipo)?.isPOS).length;
  const renovV = ventas.filter(v=>STYPES.find(s=>s.key===v.tipo)?.isRENOV).length;
  const segV   = ventas.filter(v=>v.tipo==="seguro").length;
  const accM   = ventas.filter(v=>v.tipo==="accesorio").reduce((s,v)=>s+nv(v.valor),0);
  const nuevoV = ventas.filter(v=>STYPES.find(s=>s.key===v.tipo)?.tag==="NUEVO").length;
  const propioV= ventas.filter(v=>["PROPIO"].includes(STYPES.find(s=>s.key===v.tipo)?.tag||"")).length;
  const alcPos  = T.pospago>0?posV/T.pospago:0;
  const alcRenov= T.renovaciones>0?renovV/T.renovaciones:0;
  const alcSeg  = T.seguros>0?segV/T.seguros:0;
  const alcAcc  = T.accesorios>0?accM/T.accesorios:0;
  const alcT    = ct>0?vt/ct:0;
  const tiendaOK= alcT>=0.80;
  const minPos2 = posV>=2;
  const puedeC  = tiendaOK&&minPos2;
  const bpT = BONO_POS.find(t=>alcPos>=t.ai&&alcT>=t.at)||BONO_POS[3];
  const brT = BONO_RENOV.find(t=>alcRenov>=t.ai&&alcT>=t.at)||BONO_RENOV[3];
  const bonoPOS  = puedeC?bpT.bono:0;
  const bonoRENOV= puedeC?brT.bono:0;
  const alcTotOK = (alcPos+alcRenov)/2>=1.0;
  const lA3 = ventas.filter(v=>v.plan_id&&AZUL3_IDS.includes(v.plan_id)&&(v.tipo==="pos_nuevo"||v.tipo==="renov_nuevo")).length;
  const lPl = ventas.filter(v=>v.plan_id&&PLATA_IDS.includes(v.plan_id)&&(v.tipo==="pos_nuevo"||v.tipo==="renov_nuevo")).length;
  const iL100  = puedeC&&alcTotOK&&mx>=0.55?lA3*100:0;
  const iLPl   = puedeC&&alcTotOK&&mx>=0.60?lPl*200:0;
  const comV = ventas.reduce((s,v)=>{
    if (!puedeC) return s;
    if (v.tipo==="accesorio") return s+nv(v.valor)*(v.es_alpha?0.10:0.02);
    if (v.tipo==="seguro")    return s+nv(v.valor)*0.80;
    if (v.tipo==="prepago")   return s+(nv(v.valor)>=150?nv(v.valor)*0.40:0);
    if (v.plan_com)           return s+nv(v.plan_com);
    return s;
  },0);
  const acum = comV+bonoPOS+bonoRENOV+iL100+iLPl;
  return {posV,renovV,segV,accM,nuevoV,propioV,alcPos,alcRenov,alcSeg,alcAcc,alcT,tiendaOK,minPos2,puedeC,bonoPOS,bonoRENOV,bpT,brT,iL100,iLPl,comV,acum,perdida:acum-T.meta_ingreso,mx,ct,vt};
}

function ventaCom(v, puedeC) {
  if (!puedeC) return 0;
  if (v.tipo==="accesorio") return nv(v.valor)*(v.es_alpha?0.10:0.02);
  if (v.tipo==="seguro")    return nv(v.valor)*0.80;
  if (v.tipo==="prepago")   return nv(v.valor)>=150?nv(v.valor)*0.40:0;
  if (v.plan_com)           return nv(v.plan_com);
  return 0;
}

}

function NuevaVenta({ onAdd, accent }) {
  const [tipo,setPlanT]=useState("pos_nuevo");
  const [planId,setPlanId]=useState("");
  const [valor,setValor]=useState("");
  const [alpha,setAlpha]=useState(false);
  const [dia,setDia]=useState(0);
  const [loading,setL]=useState(false);
  const st=STYPES.find(s=>s.key===tipo);
  const planObj=st?.planes?.find(p=>p.id===planId)||null;
  const groups=[
    {label:"Pospago",keys:["pos_nuevo","pos_propio"]},
    {label:"Renovaciones",keys:["renov_nuevo","renov_propio"]},
    {label:"Armalo Negocios",keys:["neg_nuevo","neg_propio"]},
    {label:"Plan Lite",keys:["lite"]},
    {label:"Adicionales",keys:["accesorio","seguro","prepago"]},
  ];
  async function add(){
    if(st?.planes&&!planObj) return;
    if(!st?.planes&&!nv(valor)) return;
    setL(true);
    await onAdd({tipo,plan_id:planObj?.id||null,plan_nombre:planObj?.n||null,plan_renta:planObj?.r||null,plan_com:planObj?.c||null,valor:nv(valor),es_alpha:alpha,dia});
    setPlanId(""); setValor(""); setAlpha(false); setL(false);
  }
  return (
    <div style={{background:"#f8fafc",borderRadius:12,padding:"14px 16px",border:"2px dashed #cbd5e1"}}>
      <div style={{fontSize:11,fontWeight:800,color:accent,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>+ Registrar venta</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <label style={S.lbl}>Dia</label>
          <select value={dia} onChange={e=>setDia(+e.target.value)} style={S.sel}>
            {DAYS_F.map((d,i)=><option key={i} value={i}>{d}</option>)}
          </select>
        </div>
        <div>
          <label style={S.lbl}>Tipo de venta</label>
          <select value={tipo} onChange={e=>{setPlanT(e.target.value);setPlanId("");}} style={S.sel}>
            {groups.map(g=>(
              <optgroup key={g.label} label={g.label}>
                {g.keys.map(k=>{const s=STYPES.find(x=>x.key===k);return <option key={k} value={k}>{s.icon} {s.label}</option>;})}
              </optgroup>
            ))}
          </select>
        </div>
      </div>
      {st?.tag&&<div style={{marginBottom:8}}><span style={{fontSize:11,fontWeight:800,padding:"3px 10px",borderRadius:20,...(TAG_C[st.tag]||{bg:"#f1f5f9",color:"#475569"})}}>{st.tag==="NUEVO"?"Equipo Nuevo":st.tag==="PROPIO"?"Equipo Propio / BYOD":st.tag}</span></div>}
      {st?.planes&&<div style={{marginBottom:8}}><label style={S.lbl}>Plan</label><select value={planId} onChange={e=>setPlanId(e.target.value)} style={S.sel}><option value="">-- Selecciona plan --</option>{st.planes.map(p=><option key={p.id} value={p.id}>{p.n} - ${p.r} renta - ${p.c} comision</option>)}</select></div>}
      {!st?.planes&&(
        <div style={{display:"grid",gridTemplateColumns:tipo==="accesorio"?"1fr 1fr":"1fr",gap:8,marginBottom:8}}>
          <div><label style={S.lbl}>{tipo==="prepago"?"Monto recarga":"Valor"} ($)</label><input type="number" value={valor} onChange={e=>setValor(e.target.value)} placeholder="0" style={S.inp}/></div>
          {tipo==="accesorio"&&<div style={{display:"flex",flexDirection:"column",justifyContent:"flex-end",paddingBottom:3}}><label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#374151",cursor:"pointer"}}><input type="checkbox" checked={alpha} onChange={e=>setAlpha(e.target.checked)}/> ALPHACOMM (10%)</label><div style={{fontSize:10,color:"#94a3b8"}}>Otras marcas = 2%</div></div>}
        </div>
      )}
      <button onClick={add} disabled={loading} style={{background:accent,color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",fontWeight:700,fontSize:13,cursor:"pointer",width:"100%",opacity:loading?0.7:1}}>{loading?"Guardando...":"Agregar venta"}</button>
    </div>
  );
}

function Login({ onLogin }) {
  const [mode,setMode]=useState("select");
  const [nombre,setNombre]=useState("");
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [execs,setExecs]=useState([]);
  useEffect(()=>{ sb("/ejecutivos?select=id,nombre&order=nombre").then(setExecs).catch(()=>{}); },[]);
  async function loginExec(){
    if(!nombre||!pin) return setErr("Selecciona tu nombre e ingresa tu PIN.");
    setLoading(true); setErr("");
    try {
      const res=await sb(`/ejecutivos?nombre=eq.${encodeURIComponent(nombre)}&pin=eq.${pin}&select=*`);
      if(!res||!res.length){setErr("PIN incorrecto.");setLoading(false);return;}
      onLogin({type:"exec",exec:res[0]});
    } catch(e){setErr("Error de conexion.");setLoading(false);}
  }
  async function register(){
    if(!nombre.trim()||pin.length<4) return setErr("Nombre requerido y PIN de minimo 4 digitos.");
    setLoading(true); setErr("");
    try {
      const exists=await sb(`/ejecutivos?nombre=eq.${encodeURIComponent(nombre.trim())}&select=id`);
      if(exists&&exists.length){setErr("Ese nombre ya existe.");setLoading(false);return;}
      const res=await sb("/ejecutivos",{method:"POST",body:JSON.stringify({nombre:nombre.trim(),pin})});
      onLogin({type:"exec",exec:res[0]});
    } catch(e){setErr("Error al registrar.");setLoading(false);}
  }
  function loginAdmin(){ if(pin!==ADMIN_PIN) return setErr("PIN incorrecto."); onLogin({type:"admin"}); }
  const darkInp={...S.inp,background:"#0f172a",color:"#e2e8f0",border:"1.5px solid #334155"};
  const darkSel={...S.sel,background:"#0f172a",color:"#e2e8f0",border:"1.5px solid #334155"};
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0f172a 0%,#1a3a5c 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"sans-serif"}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:11,fontWeight:800,letterSpacing:"0.2em",textTransform:"uppercase",color:"#64748b",marginBottom:6}}>PRIME MX</div>
          <div style={{fontSize:28,fontWeight:900,color:"#f1f5f9",letterSpacing:"-0.03em"}}>Sales Tracker</div>
          <div style={{fontSize:13,color:"#64748b",marginTop:4}}>Leon Altacia</div>
        </div>
        <div style={{background:"#1e293b",borderRadius:20,padding:"28px 24px",border:"1px solid #334155"}}>
          {mode==="select"&&<div>
            <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",textAlign:"center",marginBottom:20}}>Como quieres entrar?</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={()=>setMode("exec")} style={{padding:"14px",borderRadius:12,border:"1.5px solid #2d6a9f",background:"rgba(29,106,175,0.15)",color:"#7dd3fc",fontWeight:700,fontSize:14,cursor:"pointer",textAlign:"left"}}>Soy ejecutivo de ventas</button>
              <button onClick={()=>setMode("register")} style={{padding:"14px",borderRadius:12,border:"1.5px solid #334155",background:"rgba(51,65,85,0.3)",color:"#94a3b8",fontWeight:700,fontSize:14,cursor:"pointer",textAlign:"left"}}>Registrarme por primera vez</button>
              <button onClick={()=>setMode("admin")} style={{padding:"14px",borderRadius:12,border:"1.5px solid #f59e0b44",background:"rgba(245,158,11,0.08)",color:"#fbbf24",fontWeight:700,fontSize:14,cursor:"pointer",textAlign:"left"}}>Soy administrador</button>
            </div>
          </div>}
          {mode==="exec"&&<div>
            <button onClick={()=>{setMode("select");setErr("");}} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:12,marginBottom:16,padding:0}}>Volver</button>
            <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",marginBottom:16}}>Selecciona tu nombre</div>
            <div style={{marginBottom:12}}><label style={{...S.lbl,color:"#64748b"}}>Nombre</label><select value={nombre} onChange={e=>setNombre(e.target.value)} style={darkSel}><option value="">-- Selecciona --</option>{execs.map(e=><option key={e.id} value={e.nombre}>{e.nombre}</option>)}</select></div>
            <div style={{marginBottom:16}}><label style={{...S.lbl,color:"#64748b"}}>PIN</label><input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&loginExec()} placeholder="Tu PIN" style={darkInp}/></div>
            {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:10}}>{err}</div>}
            <button onClick={loginExec} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#0f2942,#1a5276)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>{loading?"Verificando...":"Entrar"}</button>
          </div>}
          {mode==="register"&&<div>
            <button onClick={()=>{setMode("select");setErr("");}} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:12,marginBottom:16,padding:0}}>Volver</button>
            <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",marginBottom:16}}>Crear tu acceso</div>
            <div style={{marginBottom:12}}><label style={{...S.lbl,color:"#64748b"}}>Tu nombre completo</label><input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej. Ana Garcia" style={darkInp}/></div>
            <div style={{marginBottom:16}}><label style={{...S.lbl,color:"#64748b"}}>Crea un PIN (minimo 4 digitos)</label><input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder="Ej. 1234" style={darkInp}/></div>
            {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:10}}>{err}</div>}
            <button onClick={register} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#0d3b2e,#1a6645)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>{loading?"Registrando...":"Crear acceso"}</button>
          </div>}
          {mode==="admin"&&<div>
            <button onClick={()=>{setMode("select");setErr("");}} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:12,marginBottom:16,padding:0}}>Volver</button>
            <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0",marginBottom:16}}>Acceso Administrador</div>
            <div style={{marginBottom:16}}><label style={{...S.lbl,color:"#64748b"}}>PIN Admin</label><input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&loginAdmin()} placeholder="PIN administrador" style={darkInp}/></div>
            {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:10}}>{err}</div>}
            <button onClick={loginAdmin} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#3b2200,#7a4800)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>Entrar como Admin</button>
          </div>}
        </div>
      </div>
    </div>
  );
}

// ─── EXEC VIEW ────────────────────────────────────────────────
function ExecView({ exec, onLogout }) {
  const [ventas,setVentas]=useState([]);
  const [cfg,setCfg]=useState({cuota_tienda:"",ventas_tienda:"",mix_nuevo:"65"});
  const [cfgId,setCfgId]=useState(null);
  const [ingresoAnt,setIA]=useState(Object.fromEntries(DAYS_S.map((_,i)=>[i,""])));
  const [prosp,setProsp]=useState(Object.fromEntries(DAYS_S.map((_,i)=>[i,{prospectos:"",mensajes:"",ventas_act:""}])));
  const [tab,setTab]=useState("sim");
  const [semLabel,setSemLabel]=useState("Semana actual");
  const [saving,setSaving]=useState(false);
  const [loading,setLoading]=useState(true);
  const cs=PAL[0];

  const load=useCallback(async()=>{
    setLoading(true);
    try {
      const [v,c]=await Promise.all([
        sb(`/ventas?ejecutivo_id=eq.${exec.id}&order=created_at`),
        sb(`/config_ejecutivo?ejecutivo_id=eq.${exec.id}&limit=1`),
      ]);
      setVentas(v||[]);
      if(c&&c.length){
        const cx=c[0];
        setCfgId(cx.id);
        setCfg({cuota_tienda:cx.cuota_tienda||"",ventas_tienda:cx.ventas_tienda||"",mix_nuevo:cx.mix_nuevo||"65"});
        setIA(cx.ingreso_ant||Object.fromEntries(DAYS_S.map((_,i)=>[i,""])));
        if(cx.prosp_dias) setProsp(cx.prosp_dias);
        if(cx.semana_label) setSemLabel(cx.semana_label);
      }
    } catch(e){}
    setLoading(false);
  },[exec.id]);

  useEffect(()=>{ load(); },[load]);

  useEffect(()=>{
    if(loading) return;
    const t=setTimeout(async()=>{
      setSaving(true);
      const payload={ejecutivo_id:exec.id,ventas_tienda:nv(cfg.ventas_tienda),mix_nuevo:nv(cfg.mix_nuevo),ingreso_ant:ingresoAnt,prosp_dias:prosp,semana_label:semLabel,updated_at:new Date().toISOString()};
      // NOTE: exec cannot edit cuota_tienda - it comes read-only from admin
      try {
        if(cfgId){await sb(`/config_ejecutivo?id=eq.${cfgId}`,{method:"PATCH",body:JSON.stringify(payload)});}
        else{const r=await sb("/config_ejecutivo",{method:"POST",body:JSON.stringify({...payload,cuota_tienda:0})});if(r&&r[0])setCfgId(r[0].id);}
      } catch(e){}
      setSaving(false);
    },800);
    return ()=>clearTimeout(t);
  },[cfg.ventas_tienda,cfg.mix_nuevo,ingresoAnt,prosp,semLabel,loading]);

  async function addVenta(v){
    const res=await sb("/ventas",{method:"POST",body:JSON.stringify({...v,ejecutivo_id:exec.id,semana_label:semLabel})});
    if(res&&res[0]) setVentas(p=>[...p,res[0]]);
  }
  async function removeVenta(id){
    await sb(`/ventas?id=eq.${id}`,{method:"DELETE",headers:{Prefer:"return=minimal"}});
    setVentas(p=>p.filter(v=>v.id!==id));
  }

  const s=calcStats(ventas,cfg);
  const dias=Object.fromEntries(DAYS_S.map((_,i)=>[i,0]));
  ventas.forEach(v=>{ dias[v.dia]=(dias[v.dia]||0)+ventaCom(v,s.puedeC); });
  const totAct=Object.values(dias).reduce((x,v)=>x+v,0);
  const totAnt=DAYS_S.reduce((x,_,i)=>x+nv(ingresoAnt[i]),0);
  const dIng=totAnt>0?((totAct-totAnt)/totAnt)*100:0;

  const TABS=[{k:"sim",l:"Simulacion"},{k:"prosp",l:"Prospeccion"},{k:"ventas",l:"Ventas"},{k:"kpis",l:"KPIs"},{k:"ingresos",l:"Ingresos"}];

  if(loading) return <div style={{minHeight:"100vh",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#64748b",fontSize:14}}>Cargando...</div></div>;

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9",fontFamily:"sans-serif",paddingBottom:60}}>
      <div style={{background:"#0f172a",padding:"16px 20px",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 24px rgba(0,0,0,0.25)"}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:"#475569"}}>PRIME MX - Sales Tracker</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
              <div style={{fontSize:17,fontWeight:900,color:"#f1f5f9"}}>{exec.nombre}</div>
              <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:saving?"rgba(245,158,11,0.2)":"rgba(16,185,129,0.2)",color:saving?"#f59e0b":"#10b981"}}>{saving?"guardando":"guardado"}</span>
            </div>
          </div>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#94a3b8",padding:"7px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>Salir</button>
        </div>
        <div style={{maxWidth:860,margin:"10px auto 0",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <input value={semLabel} onChange={e=>setSemLabel(e.target.value)} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,color:"#e2e8f0",padding:"5px 10px",fontSize:12,outline:"none",width:170}}/>
          <div style={{fontSize:11,color:"#475569"}}>
            Cuota tienda: <strong style={{color:"#7dd3fc"}}>{cfg.cuota_tienda||"—"}</strong> (fijada por admin)
          </div>
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px 0"}}>
        <div style={{background:"#fff",borderRadius:20,border:`1.5px solid ${cs.brd}`,overflow:"hidden",boxShadow:`0 6px 32px ${cs.acc}18`}}>
          <div style={{background:cs.grad,padding:"16px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:900,fontSize:22,color:"#fff"}}>{fmtM(s.acum)}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.7)"}}>estimado esta semana</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,fontSize:14,color:s.perdida>=0?"#34d399":"#f87171"}}>{s.perdida>=0?`+${fmtM(s.perdida)} sobre meta`:`Faltan ${fmtM(Math.abs(s.perdida))}`}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.55)"}}>meta {fmtM(T.meta_ingreso)}</div>
              </div>
            </div>
            <div style={{height:6,background:"rgba(255,255,255,0.15)",borderRadius:99,overflow:"hidden",marginTop:10}}>
              <div style={{height:"100%",width:`${Math.min(T.meta_ingreso>0?s.acum/T.meta_ingreso:0,1)*100}%`,background:s.perdida>=0?"#34d399":"#fbbf24",borderRadius:99,transition:"width 0.4s"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginTop:12}}>
              {[{l:"POS",v:s.posV,t:T.pospago,a:s.alcPos},{l:"RENOV",v:s.renovV,t:T.renovaciones,a:s.alcRenov},{l:"SEG",v:s.segV,t:T.seguros,a:s.alcSeg},{l:"ACC",v:fmtM(s.accM),t:fmtM(T.accesorios),a:s.alcAcc}].map(k=>(
                <div key={k.l} style={{background:"rgba(255,255,255,0.12)",borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
                  <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.6)",textTransform:"uppercase"}}>{k.l}</div>
                  <div style={{fontWeight:900,fontSize:14,color:"#fff",lineHeight:1.1,marginTop:2}}>{k.v}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.5)"}}>/{k.t}</div>
                  <div style={{height:3,background:"rgba(255,255,255,0.18)",borderRadius:99,marginTop:4}}>
                    <div style={{height:"100%",width:`${Math.min(k.a,1)*100}%`,background:k.a>=1?"#34d399":k.a>=0.8?"#fbbf24":"#f87171",borderRadius:99}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div style={{display:"flex",borderBottom:"1.5px solid #f1f5f9",background:cs.soft,overflowX:"auto"}}>
            {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{flexShrink:0,padding:"10px 14px",border:"none",cursor:"pointer",background:"transparent",fontWeight:700,fontSize:12,color:tab===t.k?cs.acc:"#94a3b8",borderBottom:tab===t.k?`2.5px solid ${cs.acc}`:"2.5px solid transparent",marginBottom:-1.5,whiteSpace:"nowrap"}}>{t.l}</button>)}
          </div>

          <div style={{padding:"20px 22px"}}>

            {tab==="sim"&&(
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:12}}>Simulacion de ingreso semanal</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  <div><label style={S.lbl}>Ventas tienda (pospago)</label><input type="number" value={cfg.ventas_tienda} onChange={e=>setCfg(p=>({...p,ventas_tienda:e.target.value}))} placeholder="ej. 48" style={S.inp}/></div>
                  <div><label style={S.lbl}>Mix Nuevo (%)</label><input type="number" value={cfg.mix_nuevo} onChange={e=>setCfg(p=>({...p,mix_nuevo:e.target.value}))} placeholder="65" style={S.inp}/></div>
                </div>
                <Simulacion ventas={ventas} cfg={cfg} accent={cs.acc} soft={cs.soft} border={cs.brd}/>
                <div style={{marginTop:12,padding:"10px 12px",background:"#f8fafc",borderRadius:9,border:"1px solid #e2e8f0",fontSize:11,color:"#64748b",lineHeight:1.5}}>
                  La cuota de tienda la fija el administrador. Necesitas cuota tienda mayor o igual a 80% y minimo 2 pospagos individuales para activar comisiones.
                </div>
              </div>
            )}

            {tab==="prosp"&&(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
                  {[["prospectos","Prospectos"],["mensajes","Mensajes"],["ventas_act","Ventas Activ."]].map(([key,label])=>{
                    const tot=DAYS_S.reduce((s,_,i)=>s+nv(prosp[i]?.[key]),0);
                    return(
                      <div key={key} style={{background:cs.soft,borderRadius:10,padding:"10px",border:`1px solid ${cs.brd}`,textAlign:"center"}}>
                        <div style={{fontWeight:800,fontSize:20,color:cs.acc}}>{tot}</div>
                        <div style={{fontSize:10,color:"#94a3b8"}}>{label}</div>
                      </div>
                    );
                  })}
                </div>
                {DAYS_S.map((_,i)=>(
                  <details key={i} style={{border:"1.5px solid #f1f5f9",borderRadius:10,overflow:"hidden",marginBottom:6}}>
                    <summary style={{padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:13,color:"#374151",listStyle:"none",display:"flex",justifyContent:"space-between"}}>
                      <span>{DAYS_F[i]}</span>
                      <span style={{fontSize:11,color:"#94a3b8"}}>{nv(prosp[i]?.prospectos)} prosp / {nv(prosp[i]?.mensajes)} msgs / {nv(prosp[i]?.ventas_act)} act.</span>
                    </summary>
                    <div style={{padding:"12px 14px",background:"#fafafa",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                      {[["prospectos","Prospectos"],["mensajes","Mensajes"],["ventas_act","Ventas Activ."]].map(([k,lb])=>(
                        <div key={k}><label style={S.lbl}>{lb}</label><input type="number" value={prosp[i]?.[k]||""} onChange={e=>setProsp(p=>({...p,[i]:{...p[i],[k]:e.target.value}}))} placeholder="0" style={S.inp}/></div>
                      ))}
                    </div>
                  </details>
                ))}
              </div>
            )}

            {tab==="ventas"&&(
              <div>
                {ventas.length>0&&(
                  <div style={{marginBottom:16}}>
                    {DAYS_S.map((_,di)=>{
                      const vd=ventas.filter(v=>v.dia===di);
                      if(!vd.length) return null;
                      return(
                        <div key={di} style={{marginBottom:10}}>
                          <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>{DAYS_F[di]}</div>
                          {vd.map(v=>{
                            const st=STYPES.find(x=>x.key===v.tipo);
                            const com=ventaCom(v,s.puedeC);
                            const tagC=st?.tag?(TAG_C[st.tag]||null):null;
                            return(
                              <div key={v.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"#f8fafc",borderRadius:9,marginBottom:4,border:"1px solid #f1f5f9"}}>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                    <span style={{fontSize:12,fontWeight:600,color:"#374151"}}>{st?.icon} {v.plan_nombre||st?.label}{!v.plan_nombre&&v.valor?" $"+nv(v.valor).toLocaleString():""}</span>
                                    {tagC&&<span style={{fontSize:9,fontWeight:800,padding:"1px 6px",borderRadius:20,...tagC}}>{st.tag}</span>}
                                  </div>
                                  {v.plan_renta&&<div style={{fontSize:10,color:"#94a3b8"}}>${v.plan_renta} renta</div>}
                                </div>
                                <span style={{fontSize:14,fontWeight:900,color:com>0?cs.acc:"#94a3b8",minWidth:50,textAlign:"right"}}>${Math.round(com).toLocaleString()}</span>
                                <button onClick={()=>removeVenta(v.id)} style={{background:"none",border:"none",color:"#cbd5e1",cursor:"pointer",fontSize:14,padding:"0 2px",flexShrink:0}}>x</button>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:cs.soft,borderRadius:10,border:`1.5px solid ${cs.brd}`,marginTop:4,marginBottom:14}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:12,color:"#374151"}}>Comisiones {fmtM(s.comV)}</div>
                        {(s.bonoPOS+s.bonoRENOV)>0&&<div style={{fontSize:11,color:"#10b981",fontWeight:700}}>+ Bonos {fmtM(s.bonoPOS+s.bonoRENOV)}</div>}
                      </div>
                      <span style={{fontWeight:900,fontSize:20,color:cs.acc}}>{fmtM(s.acum)}</span>
                    </div>
                  </div>
                )}
                <NuevaVenta onAdd={addVenta} accent={cs.acc}/>
              </div>
            )}

            {tab==="kpis"&&(
              <div>
                {[{l:"Pospagos",v:s.posV,t:T.pospago,bono:s.bonoPOS,tier:s.bpT?.label},{l:"Renovaciones",v:s.renovV,t:T.renovaciones,bono:s.bonoRENOV,tier:s.brT?.label},{l:"Seguros",v:s.segV,t:T.seguros},{l:"Accesorios",v:s.accM,t:T.accesorios,unit:"$"}].map(k=>{
                  const ratio=k.t>0?k.v/k.t:0;
                  const color=ratio>=1?"#10b981":ratio>=0.8?"#f59e0b":"#ef4444";
                  return(
                    <div key={k.l} style={{marginBottom:13}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <span style={{fontSize:11,fontWeight:700,color:"#475569"}}>{k.l}</span>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          {k.bono!==undefined&&<span style={{fontSize:10,fontWeight:800,padding:"1px 7px",borderRadius:20,background:ratio>=1?"#d1fae5":"#fef3c7",color:ratio>=1?"#065f46":"#92400e"}}>{ratio>=1?`Bono ${fmtM(k.bono)}`:`Falta ${k.t-k.v}`}</span>}
                          <span style={{fontSize:12,fontWeight:800,color}}>{k.unit==="$"?fmtM(k.v):k.v}/{k.unit==="$"?fmtM(k.t):k.t} - {fp(Math.min(ratio,9.99))}</span>
                        </div>
                      </div>
                      <div style={{height:7,background:"#f1f5f9",borderRadius:99,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${Math.min(ratio,1)*100}%`,background:color,borderRadius:99,transition:"width 0.4s"}}/>
                      </div>
                      {k.tier&&<div style={{fontSize:9,color:"#94a3b8",marginTop:2}}>{k.tier}</div>}
                    </div>
                  );
                })}
                <div style={{marginTop:14,padding:"14px 16px",background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0"}}>
                  <div style={{fontSize:11,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Bonos escalonados</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {[{label:"Bono Pospago",tiers:BONO_POS,current:s.bpT?.label},{label:"Bono Renovaciones",tiers:BONO_RENOV,current:s.brT?.label}].map(b=>(
                      <div key={b.label}>
                        <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:6}}>{b.label}</div>
                        {b.tiers.map((t,i)=>(
                          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",borderRadius:7,marginBottom:3,background:b.current===t.label?"#d1fae5":"#f8fafc",border:b.current===t.label?"1.5px solid #10b981":"1.5px solid #f1f5f9"}}>
                            <span style={{fontSize:9,color:b.current===t.label?"#065f46":"#94a3b8",lineHeight:1.3}}>{t.label}</span>
                            <span style={{fontWeight:800,fontSize:11,color:b.current===t.label?"#10b981":t.bono>0?"#374151":"#cbd5e1"}}>{t.bono>0?fmtM(t.bono):"--"}</span>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {tab==="ingresos"&&(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",background:cs.soft,borderRadius:12,border:`1.5px solid ${cs.brd}`,marginBottom:16}}>
                  <div>
                    <div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>Ingresos semana actual</div>
                    <div style={{fontSize:26,fontWeight:900,color:cs.acc,letterSpacing:"-0.03em"}}>{fmtM(totAct)}</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>vs {fmtM(totAnt)} sem. ant.</div>
                  </div>
                  {(totAct>0||totAnt>0)&&<span style={{fontSize:11,fontWeight:800,padding:"2px 8px",borderRadius:20,background:dIng>=0?"#d1fae5":"#fee2e2",color:dIng>=0?"#065f46":"#991b1b"}}>{dIng>=0?"^":"-"}{Math.abs(dIng).toFixed(1)}%</span>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:6,marginBottom:6}}>
                  {["Dia","Ant $","Actual $","Delta"].map(h=><span key={h} style={{...S.lbl,margin:0}}>{h}</span>)}
                </div>
                {DAYS_S.map((_,i)=>{
                  const c=dias[i]||0,p=nv(ingresoAnt[i]);
                  const d=p>0?((c-p)/p)*100:0;
                  return(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:6,alignItems:"center",marginBottom:6}}>
                      <span style={{fontSize:12,fontWeight:600,color:"#374151"}}>{DAYS_F[i]}</span>
                      <input type="number" value={ingresoAnt[i]||""} onChange={e=>setIA(p=>({...p,[i]:e.target.value}))} placeholder="0" style={{...S.inp,textAlign:"right",padding:"6px 8px",fontSize:12}}/>
                      <div style={{textAlign:"right",fontWeight:700,fontSize:13,color:c>0?cs.acc:"#94a3b8"}}>${Math.round(c).toLocaleString()}</div>
                      <div style={{textAlign:"right"}}>{(c>0||p>0)?<span style={{fontSize:10,fontWeight:800,padding:"1px 5px",borderRadius:20,background:d>=0?"#d1fae5":"#fee2e2",color:d>=0?"#065f46":"#991b1b"}}>{d>=0?"^":"-"}{Math.abs(d).toFixed(0)}%</span>:<span style={{fontSize:10,color:"#e2e8f0"}}>--</span>}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── ADMIN VIEW ───────────────────────────────────────────────
function AdminView({ onLogout }) {
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [lastRef,setLastRef]=useState(null);
  const [adminTab,setAdminTab]=useState("ranking");
  const [cuotaGlobal,setCuotaGlobal]=useState("");
  const [savingCuota,setSavingCuota]=useState(false);

  const load=useCallback(async()=>{
    try {
      const [execs,ventas,cfgs]=await Promise.all([
        sb("/ejecutivos?select=*&order=nombre"),
        sb("/ventas?select=*&order=created_at"),
        sb("/config_ejecutivo?select=*"),
      ]);
      const built=(execs||[]).map((exec,idx)=>{
        const ev=(ventas||[]).filter(v=>v.ejecutivo_id===exec.id);
        const cfg=(cfgs||[]).find(c=>c.ejecutivo_id===exec.id)||{};
        const s=calcStats(ev,cfg);
        return {exec,ev,cfg,s,cs:PAL[idx%PAL.length]};
      }).sort((a,b)=>b.s.acum-a.s.acum);
      setRows(built);
      if(built.length>0&&built[0].cfg.cuota_tienda) setCuotaGlobal(String(built[0].cfg.cuota_tienda));
      setLastRef(new Date().toLocaleTimeString("es-MX"));
    } catch(e){}
    setLoading(false);
  },[]);

  useEffect(()=>{ load(); const iv=setInterval(load,30000); return()=>clearInterval(iv); },[load]);

  async function saveCuota(){
    if(!cuotaGlobal) return;
    setSavingCuota(true);
    try {
      const cfgs=await sb("/config_ejecutivo?select=id,ejecutivo_id");
      for(const exec of rows){
        const existing=(cfgs||[]).find(c=>c.ejecutivo_id===exec.exec.id);
        if(existing){
          await sb(`/config_ejecutivo?id=eq.${existing.id}`,{method:"PATCH",body:JSON.stringify({cuota_tienda:nv(cuotaGlobal)})});
        } else {
          await sb("/config_ejecutivo",{method:"POST",body:JSON.stringify({ejecutivo_id:exec.exec.id,cuota_tienda:nv(cuotaGlobal),mix_nuevo:65})});
        }
      }
      await load();
    } catch(e){}
    setSavingCuota(false);
  }

  const totAcum=rows.reduce((x,r)=>x+r.s.acum,0);
  const totMeta=rows.length*T.meta_ingreso;
  const totBonos=rows.reduce((x,r)=>x+r.s.bonoPOS+r.s.bonoRENOV,0);
  const totPos=rows.reduce((x,r)=>x+r.s.posV,0);

  const ATABS=[{k:"ranking",l:"Ranking"},{k:"simulacion",l:"Simulaciones"},{k:"prospeccion",l:"Prospeccion"},{k:"cuota",l:"Cuota"}];

  if(loading) return <div style={{minHeight:"100vh",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#64748b"}}>Cargando equipo...</div></div>;

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9",fontFamily:"sans-serif",paddingBottom:60}}>
      <div style={{background:"#0f172a",padding:"16px 20px",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 24px rgba(0,0,0,0.25)"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:"#475569"}}>PRIME MX - Admin</div>
            <div style={{fontSize:17,fontWeight:900,color:"#f1f5f9"}}>Dashboard Leon Altacia</div>
            {lastRef&&<div style={{fontSize:10,color:"#475569",marginTop:1}}>Actualizado {lastRef} - auto-refresh 30s</div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={load} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#94a3b8",padding:"7px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>Refresh</button>
            <button onClick={onLogout} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#94a3b8",padding:"7px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>Salir</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px 0"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
          {[["Acumulado equipo",fmtM(totAcum),"#1a6fa8"],["Meta total",fmtM(totMeta),totAcum>=totMeta?"#10b981":"#ef4444"],["Bonos desbloqueados",fmtM(totBonos),"#10b981"],["Pospagos totales",totPos,"#f97316"]].map(([lb,v,c])=>(
            <div key={lb} style={{background:"#fff",borderRadius:14,padding:"14px",border:"1.5px solid #f1f5f9",boxShadow:"0 2px 12px rgba(0,0,0,0.04)"}}>
              <div style={{fontWeight:900,fontSize:20,color:c}}>{v}</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{lb}</div>
            </div>
          ))}
        </div>

        <div style={{background:"#fff",borderRadius:16,border:"1.5px solid #e2e8f0",overflow:"hidden",boxShadow:"0 2px 16px rgba(0,0,0,0.05)",marginBottom:20}}>
          <div style={{display:"flex",borderBottom:"1.5px solid #f1f5f9",background:"#f8fafc",overflowX:"auto"}}>
            {ATABS.map(t=><button key={t.k} onClick={()=>setAdminTab(t.k)} style={{flexShrink:0,padding:"11px 18px",border:"none",cursor:"pointer",background:"transparent",fontWeight:700,fontSize:12,color:adminTab===t.k?"#1a6fa8":"#94a3b8",borderBottom:adminTab===t.k?"2.5px solid #1a6fa8":"2.5px solid transparent",marginBottom:-1.5,whiteSpace:"nowrap"}}>{t.l}</button>)}
          </div>

          <div style={{padding:"20px"}}>

            {adminTab==="ranking"&&(
              <div>
                <div style={{height:8,background:"#f1f5f9",borderRadius:99,overflow:"hidden",marginBottom:20}}>
                  <div style={{height:"100%",width:`${Math.min(totMeta>0?totAcum/totMeta:0,1)*100}%`,background:totAcum>=totMeta?"#10b981":"linear-gradient(90deg,#f59e0b,#f97316)",borderRadius:99}}/>
                </div>
                {rows.map(({exec,s,cs,ev},rank)=>{
                  const perdida=s.acum-T.meta_ingreso;
                  return(
                    <div key={exec.id} style={{padding:"14px",borderBottom:"1px solid #f8fafc",marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:28,height:28,borderRadius:"50%",background:rank===0?"#f59e0b":rank===1?"#9ca3af":rank===2?"#d97706":"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:rank<3?"#fff":"#9ca3af",flexShrink:0}}>{rank+1}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{exec.nombre}</div>
                          <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>POS:{s.posV} RENOV:{s.renovV} SEG:{s.segV} - Nuevo:{s.nuevoV} / Propio:{s.propioV}</div>
                          <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
                            {s.bonoPOS>0&&<span style={{fontSize:10,fontWeight:800,background:"#d1fae5",color:"#065f46",padding:"1px 7px",borderRadius:20}}>Bono POS {fmtM(s.bonoPOS)}</span>}
                            {s.bonoRENOV>0&&<span style={{fontSize:10,fontWeight:800,background:"#d1fae5",color:"#065f46",padding:"1px 7px",borderRadius:20}}>Bono RENOV {fmtM(s.bonoRENOV)}</span>}
                            {!s.tiendaOK&&<span style={{fontSize:10,fontWeight:800,background:"#fee2e2",color:"#991b1b",padding:"1px 7px",borderRadius:20}}>Sin comisiones</span>}
                            {!s.minPos2&&<span style={{fontSize:10,fontWeight:800,background:"#fef3c7",color:"#92400e",padding:"1px 7px",borderRadius:20}}>Falta min pospago</span>}
                          </div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontWeight:900,fontSize:17,color:cs.acc}}>{fmtM(s.acum)}</div>
                          <div style={{fontSize:12,fontWeight:800,color:perdida>=0?"#10b981":"#ef4444"}}>{perdida>=0?`+${fmtM(perdida)}`:`-${fmtM(Math.abs(perdida))}`}</div>
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginTop:10}}>
                        {[{l:"POS",v:s.posV,t:T.pospago},{l:"RENOV",v:s.renovV,t:T.renovaciones},{l:"SEG",v:s.segV,t:T.seguros},{l:"ACC",v:s.accM,t:T.accesorios,dollar:true}].map(k=>{
                          const r=k.t>0?k.v/k.t:0;
                          return(
                            <div key={k.l}>
                              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                                <span style={{fontSize:9,color:"#94a3b8",fontWeight:700}}>{k.l}</span>
                                <span style={{fontSize:9,color:r>=1?"#10b981":r>=0.8?"#f59e0b":"#ef4444",fontWeight:800}}>{k.dollar?fmtM(k.v):k.v}/{k.dollar?fmtM(k.t):k.t}</span>
                              </div>
                              <div style={{height:4,background:"#f1f5f9",borderRadius:99,overflow:"hidden"}}>
                                <div style={{height:"100%",width:`${Math.min(r,1)*100}%`,background:r>=1?"#10b981":r>=0.8?"#f59e0b":"#ef4444",borderRadius:99}}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {adminTab==="simulacion"&&(
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:16}}>Simulacion de ingreso - todos los ejecutivos</div>
                {rows.map(({exec,ev,cfg,cs})=>(
                  <div key={exec.id} style={{marginBottom:20}}>
                    <div style={{fontSize:12,fontWeight:800,color:cs.acc,marginBottom:8,padding:"6px 10px",background:cs.soft,borderRadius:8,border:`1px solid ${cs.brd}`}}>{exec.nombre}</div>
                    <Simulacion ventas={ev} cfg={cfg} accent={cs.acc} soft={cs.soft} border={cs.brd}/>
                  </div>
                ))}
              </div>
            )}

            {adminTab==="prospeccion"&&(
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:16}}>Concentrado de prospeccion diaria</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{background:"#f8fafc"}}>
                        <th style={{padding:"8px 12px",textAlign:"left",fontWeight:700,color:"#64748b",fontSize:10,textTransform:"uppercase",borderBottom:"2px solid #e2e8f0"}}>Ejecutivo</th>
                        {DAYS_S.map(d=>(
                          <th key={d} colSpan={3} style={{padding:"8px 4px",textAlign:"center",fontWeight:700,color:"#64748b",fontSize:10,textTransform:"uppercase",borderBottom:"2px solid #e2e8f0",borderLeft:"1px solid #e2e8f0"}}>{d}</th>
                        ))}
                        <th colSpan={3} style={{padding:"8px 4px",textAlign:"center",fontWeight:800,color:"#1a6fa8",fontSize:10,textTransform:"uppercase",borderBottom:"2px solid #e2e8f0",borderLeft:"2px solid #e2e8f0"}}>TOTAL</th>
                      </tr>
                      <tr style={{background:"#f8fafc"}}>
                        <th style={{padding:"4px 12px",borderBottom:"1px solid #e2e8f0"}}></th>
                        {DAYS_S.map(d=>["P","M","A"].map(l=>(
                          <th key={d+l} style={{padding:"4px 3px",textAlign:"center",fontWeight:700,color:"#94a3b8",fontSize:9,borderBottom:"1px solid #e2e8f0",borderLeft:l==="P"?"1px solid #e2e8f0":"none"}}>{l}</th>
                        )))}
                        {["P","M","A"].map(l=><th key={"tot"+l} style={{padding:"4px 3px",textAlign:"center",fontWeight:700,color:"#1a6fa8",fontSize:9,borderBottom:"1px solid #e2e8f0",borderLeft:l==="P"?"2px solid #e2e8f0":"none"}}>{l}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map(({exec,cfg,cs},ri)=>{
                        const pd=cfg.prosp_dias||{};
                        const totP=DAYS_S.reduce((s,_,i)=>s+nv(pd[i]?.prospectos),0);
                        const totM=DAYS_S.reduce((s,_,i)=>s+nv(pd[i]?.mensajes),0);
                        const totA=DAYS_S.reduce((s,_,i)=>s+nv(pd[i]?.ventas_act),0);
                        return(
                          <tr key={exec.id} style={{background:ri%2===0?"#fff":"#f8fafc"}}>
                            <td style={{padding:"8px 12px",fontWeight:700,color:cs.acc,fontSize:12,whiteSpace:"nowrap"}}>{exec.nombre}</td>
                            {DAYS_S.map((_,i)=>["prospectos","mensajes","ventas_act"].map((k,ki)=>(
                              <td key={i+k} style={{padding:"8px 3px",textAlign:"center",color:"#374151",borderLeft:ki===0?"1px solid #f1f5f9":"none",fontSize:12,fontWeight:nv(pd[i]?.[k])>0?700:400,color:nv(pd[i]?.[k])>0?"#1e293b":"#cbd5e1"}}>{nv(pd[i]?.[k])||"—"}</td>
                            )))}
                            <td style={{padding:"8px 4px",textAlign:"center",fontWeight:800,color:"#1a6fa8",borderLeft:"2px solid #e2e8f0"}}>{totP}</td>
                            <td style={{padding:"8px 4px",textAlign:"center",fontWeight:800,color:"#1a7a50"}}>{totM}</td>
                            <td style={{padding:"8px 4px",textAlign:"center",fontWeight:800,color:"#8a2060"}}>{totA}</td>
                          </tr>
                        );
                      })}
                      <tr style={{background:"#eaf4fb",fontWeight:800}}>
                        <td style={{padding:"8px 12px",fontWeight:800,color:"#1a6fa8",fontSize:12}}>TOTAL EQUIPO</td>
                        {DAYS_S.map((_,i)=>["prospectos","mensajes","ventas_act"].map((k,ki)=>{
                          const tot=rows.reduce((s,r)=>s+nv((r.cfg.prosp_dias||{})[i]?.[k]),0);
                          return <td key={i+k} style={{padding:"8px 3px",textAlign:"center",fontWeight:800,color:"#1a6fa8",borderLeft:ki===0?"1px solid #a8d4f0":"none",fontSize:12}}>{tot||"—"}</td>;
                        }))}
                        {["prospectos","mensajes","ventas_act"].map((k,ki)=>{
                          const tot=rows.reduce((s,r)=>s+DAYS_S.reduce((ss,_,i)=>ss+nv((r.cfg.prosp_dias||{})[i]?.[k]),0),0);
                          return <td key={"gtot"+k} style={{padding:"8px 4px",textAlign:"center",fontWeight:900,color:"#1a6fa8",fontSize:13,borderLeft:ki===0?"2px solid #a8d4f0":"none"}}>{tot}</td>;
                        })}
                      </tr>
                    </tbody>
                  </table>
                  <div style={{marginTop:10,fontSize:10,color:"#94a3b8"}}>P = Prospectos | M = Mensajes | A = Ventas Activadas</div>
                </div>
              </div>
            )}

            {adminTab==="cuota"&&(
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Cuota semanal de tienda</div>
                <div style={{fontSize:12,color:"#64748b",marginBottom:16,lineHeight:1.5}}>
                  Esta cuota se aplica a todos los ejecutivos. Es el numero de pospagos que la tienda debe vender en la semana. Los ejecutivos pueden ver este numero pero no modificarlo.
                </div>
                <div style={{display:"flex",gap:10,alignItems:"flex-end",marginBottom:20}}>
                  <div style={{flex:1}}>
                    <label style={S.lbl}>Cuota de tienda (pospagos)</label>
                    <input type="number" value={cuotaGlobal} onChange={e=>setCuotaGlobal(e.target.value)} placeholder="ej. 56" style={{...S.inp,fontSize:20,fontWeight:800,padding:"12px 14px"}}/>
                  </div>
                  <button onClick={saveCuota} disabled={savingCuota} style={{padding:"12px 24px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#0f2942,#1a5276)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",opacity:savingCuota?0.7:1,whiteSpace:"nowrap"}}>{savingCuota?"Guardando...":"Aplicar a todos"}</button>
                </div>
                <div style={{background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden"}}>
                  <div style={{padding:"12px 16px",borderBottom:"1px solid #e2e8f0",fontSize:11,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.08em"}}>Cuota actual por ejecutivo</div>
                  {rows.map(({exec,cfg,cs})=>(
                    <div key={exec.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:"1px solid #f8fafc"}}>
                      <span style={{fontWeight:700,fontSize:13,color:cs.acc}}>{exec.nombre}</span>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:13,color:"#64748b"}}>Cuota: <strong style={{color:"#1e293b"}}>{cfg.cuota_tienda||"—"}</strong> pospagos</span>
                        <span style={{fontSize:12,color:"#94a3b8"}}>Ventas: {cfg.ventas_tienda||0} ({cfg.cuota_tienda>0?fp(nv(cfg.ventas_tienda)/nv(cfg.cuota_tienda)):"—"})</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [session,setSession]=useState(null);
  if(!session) return <Login onLogin={setSession}/>;
  if(session.type==="admin") return <AdminView onLogout={()=>setSession(null)}/>;
  return <ExecView exec={session.exec} onLogout={()=>setSession(null)}/>;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App, null));
  </script>
</body>
